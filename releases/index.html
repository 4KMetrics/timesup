<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Release Notes — Time's Up</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    main {
      max-width: 720px;
      width: 100%;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 2rem;
    }

    a {
      color: #818cf8;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    a:hover {
      color: #a5b4fc;
      text-decoration: underline;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .release-list {
      list-style: none;
      padding: 0;
    }

    .release-list li {
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      background: #12122a;
      border: 1px solid #1e1e3a;
      border-radius: 6px;
      transition: border-color 0.15s ease;
    }

    .release-list li:hover {
      border-color: #6366f1;
    }

    .release-version {
      font-size: 1.15rem;
      font-weight: 600;
      color: #ffffff;
    }

    .release-date {
      color: #555570;
      font-size: 0.85rem;
      margin-left: 0.5rem;
    }

    .release-summary {
      margin-top: 0.35rem;
      font-size: 0.95rem;
      color: #a0a0b8;
    }

    footer {
      max-width: 720px;
      width: 100%;
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid #1e1e3a;
      color: #555570;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main>
    <a class="back-link" href="../index.html">&larr; Back to Home</a>

    <h1>Release Notes</h1>

    <ul class="release-list">
      <li>
        <a href="./v2.1.0.md">
          <span class="release-version">v2.1.0</span>
          <span class="release-date">March 2026</span>
        </a>
        <p class="release-summary">
          Auto-save, PIN protection, category suggestions, JSON validation,
          &ldquo;Binge Time?&rdquo; rename
        </p>
      </li>
    </ul>
  </main>

  <footer>
    <p>&copy; 2026 Built by 4KMetrics</p>
  </footer>
</body>
</html>
