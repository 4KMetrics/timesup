<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Time's Up</title>
  <style>
    :root { --bg: #1a1a2e; --text: #e0e0e0; --dim: #8892b0; --accent: #4cc9f0; --border: #0f3460; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
    h1 { font-size: 32px; margin-bottom: 12px; }
    p { color: var(--dim); font-size: 16px; margin-bottom: 24px; }
    a { color: var(--accent); text-decoration: none; font-size: 15px; }
    a:hover { text-decoration: underline; }
    .links { display: flex; gap: 24px; justify-content: center; }
  </style>
</head>
<body>
  <div>
    <h1>Time's Up</h1>
    <p>Stop doomscrolling. Block distracting sites, set time limits, and take back your focus.</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
